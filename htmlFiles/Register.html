<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../cssFiles/RegisterStyle.css">
</head>

<body>

<form id="registerForm">

    <h1 id="userInfoTitle">Enter your informations</h1>

   
    <input class="userInfo" id="nom_prenom" type="text" placeholder="Nom et prénom">
    

    <input class="userInfo" id="cin" type="text" placeholder="Numéro d'identification national">

   
    <input class="userInfo" id="prenom_pere" type="text" placeholder="Prénom du père">
    <input class="userInfo" id="prenom_grand_pere" type="text" placeholder="Prénom du grand-père">
    <input class="userInfo" id="prenom_nom_mere" type="text" placeholder="Prénom et nom de la mère">

    
    <input class="userInfo" id="birthdate" type="date" placeholder="Date de naissance">

    
    <input class="userInfo" id="address" type="text" placeholder="Adresse">
    <input class="userInfo" id="email" type="email" placeholder="Email">
    <input class="userInfo" id="phone" type="text" placeholder="Téléphone">

   
    <button type="submit" id="registerButton">Register</button>

</form>
  <script src="../JSFiles/register.js"></script>
</body>
</html>
